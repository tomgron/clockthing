<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none';">
    <title>Clock Screensaver</title>
    <!-- Premium Square Tech Font similar to Eurostile -->
    <link rel="stylesheet" href="fonts/michroma.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style_theme.css">
</head>

<body>
    <div class="clock-container">
        <div class="clock" id="clock-face">
            <div class="center-point"></div>

            <!-- Hour Hand - SVG Tapered Shape -->
            <div class="hand hour-hand" id="hour-hand">
                <svg class="hand-svg" viewBox="0 0 30 180" preserveAspectRatio="xMidYMax meet">
                    <!-- Main hand body - tapered from wide base to pointed tip -->
                    <path class="svg-hand-body"
                        d="M15 0 L17 10 L19 40 L20 80 L20 150 Q20 170 15 180 Q10 170 10 150 L10 80 L11 40 L13 10 Z" />
                    <!-- Center stripe accent -->
                    <path class="svg-hand-stripe"
                        d="M15 5 L16 15 L17 45 L17.5 85 L17.5 150 Q17.5 168 15 175 Q12.5 168 12.5 150 L12.5 85 L13 45 L14 15 Z" />
                </svg>
            </div>

            <!-- Minute Hand - SVG Tapered Shape (longer, thinner) -->
            <div class="hand minute-hand" id="minute-hand">
                <svg class="hand-svg" viewBox="0 0 24 260" preserveAspectRatio="xMidYMax meet">
                    <!-- Main hand body - tapered from wide base to pointed tip -->
                    <path class="svg-hand-body"
                        d="M12 0 L14 15 L15 50 L16 100 L16 220 Q16 250 12 260 Q8 250 8 220 L8 100 L9 50 L10 15 Z" />
                    <!-- Center stripe accent -->
                    <path class="svg-hand-stripe"
                        d="M12 5 L13 20 L14 55 L14.5 105 L14.5 218 Q14.5 248 12 255 Q9.5 248 9.5 218 L9.5 105 L10 55 L11 20 Z" />
                </svg>
            </div>

            <!-- Second Hand -->
            <div class="hand second-hand" id="second-hand"></div>

            <div id="ticks-container"></div>
            <div id="hour-numbers-container"></div>
            <div id="minute-numbers-container"></div>
        </div>
    </div>

    <!-- Theme Switcher UI (Removed per Request) -->

    <!-- Settings Panel (Only visible in /c mode) -->
    <div class="settings-panel">
        <div class="settings-header">
            <span class="settings-header-title">Appearance</span>
        </div>

        <div class="settings-scroll-area">
            <div class="appearance-grid">
                <!-- Day -->
                <div class="appearance-card" id="card-light" data-theme="light">
                    <div class="preview-box">
                        <div class="mini-clock-bg bg-day">
                            <!-- Abstract preview elements -->
                            <div class="mini-hand mini-hand-day hour"></div>
                            <div class="mini-hand mini-hand-day min"></div>
                        </div>
                    </div>
                    <span class="appearance-label">Day</span>
                </div>

                <!-- Night -->
                <div class="appearance-card" id="card-dark" data-theme="dark">
                    <div class="preview-box">
                        <div class="mini-clock-bg bg-night">
                            <div class="mini-hand mini-hand-night hour"></div>
                            <div class="mini-hand mini-hand-night min"></div>
                        </div>
                    </div>
                    <span class="appearance-label">Night</span>
                </div>
            </div>

            <!-- Watch Dial Color Section (Only visible in Light mode) -->
            <div class="dial-color-section" id="dial-color-section">
                <div class="section-title">Watch Dial Color</div>
                <div class="dial-scroll-container">
                    <div class="dial-option" id="dial-#ffffff" data-dial-color="#ffffff">
                        <div class="dial-circle" data-swatch="#ffffff"></div>
                        <span class="appearance-label">White</span>
                    </div>
                    <div class="dial-option" id="dial-#a5f3fc" data-dial-color="#a5f3fc">
                        <div class="dial-circle" data-swatch="#a5f3fc"></div>
                        <span class="appearance-label">Turquoise</span>
                    </div>
                    <div class="dial-option" id="dial-#e0f2fe" data-dial-color="#e0f2fe">
                        <div class="dial-circle" data-swatch="#e0f2fe"></div>
                        <span class="appearance-label">Glacier</span>
                    </div>
                    <div class="dial-option" id="dial-#1e3a8a" data-dial-color="#1e3a8a">
                        <div class="dial-circle" data-swatch="#1e3a8a"></div>
                        <span class="appearance-label">Ocean</span>
                    </div>
                    <div class="dial-option" id="dial-#ef4444" data-dial-color="#ef4444">
                        <div class="dial-circle" data-swatch="#ef4444"></div>
                        <span class="appearance-label">Red</span>
                    </div>
                    <div class="dial-option" id="dial-#22c55e" data-dial-color="#22c55e">
                        <div class="dial-circle" data-swatch="#22c55e"></div>
                        <span class="appearance-label">Green</span>
                    </div>
                    <div class="dial-option" id="dial-#3b82f6" data-dial-color="#3b82f6">
                        <div class="dial-circle" data-swatch="#3b82f6"></div>
                        <span class="appearance-label">Blue</span>
                    </div>
                    <div class="dial-option" id="dial-#f59e0b" data-dial-color="#f59e0b">
                        <div class="dial-circle" data-swatch="#f59e0b"></div>
                        <span class="appearance-label">Amber</span>
                    </div>
                    <div class="dial-option" id="dial-#fef3c7" data-dial-color="#fef3c7">
                        <div class="dial-circle" data-swatch="#fef3c7"></div>
                        <span class="appearance-label">Cream</span>
                    </div>
                    <div class="dial-option" id="dial-#c4b5fd" data-dial-color="#c4b5fd">
                        <div class="dial-circle" data-swatch="#c4b5fd"></div>
                        <span class="appearance-label">Lavender</span>
                    </div>
                    <div class="dial-option" id="dial-#fbcfe8" data-dial-color="#fbcfe8">
                        <div class="dial-circle" data-swatch="#fbcfe8"></div>
                        <span class="appearance-label">Rose</span>
                    </div>
                    <div class="dial-option" id="dial-#86efac" data-dial-color="#86efac">
                        <div class="dial-circle" data-swatch="#86efac"></div>
                        <span class="appearance-label">Sage</span>
                    </div>
                    <div class="dial-option" id="dial-#93c5fd" data-dial-color="#93c5fd">
                        <div class="dial-circle" data-swatch="#93c5fd"></div>
                        <span class="appearance-label">Sky</span>
                    </div>
                    <div class="dial-option" id="dial-#fed7aa" data-dial-color="#fed7aa">
                        <div class="dial-circle" data-swatch="#fed7aa"></div>
                        <span class="appearance-label">Peach</span>
                    </div>
                </div>
            </div>

            <!-- Lume Color Section (Only visible in Dark mode) -->
            <div class="lume-color-section" id="lume-color-section">
                <div class="section-title">Lume Color</div>
                <div class="dial-scroll-container">
                    <div class="dial-option lume-option" id="color-#ffffff" data-lume-color="#ffffff">
                        <div class="dial-circle lume-swatch-circle" data-swatch="#ffffff" data-swatch-border="#ccc"></div>
                        <span class="appearance-label">White</span>
                    </div>
                    <div class="dial-option lume-option" id="color-#22d3ee" data-lume-color="#22d3ee">
                        <div class="dial-circle lume-swatch-circle" data-swatch="#22d3ee"></div>
                        <span class="appearance-label">Cyan</span>
                    </div>
                    <div class="dial-option lume-option" id="color-#6ee7b7" data-lume-color="#6ee7b7">
                        <div class="dial-circle lume-swatch-circle" data-swatch="#6ee7b7"></div>
                        <span class="appearance-label">Mint</span>
                    </div>
                    <div class="dial-option lume-option" id="color-#ec4899" data-lume-color="#ec4899">
                        <div class="dial-circle lume-swatch-circle" data-swatch="#ec4899"></div>
                        <span class="appearance-label">Pink</span>
                    </div>
                    <div class="dial-option lume-option" id="color-#a855f7" data-lume-color="#a855f7">
                        <div class="dial-circle lume-swatch-circle" data-swatch="#a855f7"></div>
                        <span class="appearance-label">Purple</span>
                    </div>
                    <div class="dial-option lume-option" id="color-#f97316" data-lume-color="#f97316">
                        <div class="dial-circle lume-swatch-circle" data-swatch="#f97316"></div>
                        <span class="appearance-label">Orange</span>
                    </div>
                    <div class="dial-option lume-option" id="color-#ef4444" data-lume-color="#ef4444">
                        <div class="dial-circle lume-swatch-circle" data-swatch="#ef4444"></div>
                        <span class="appearance-label">Red</span>
                    </div>
                    <div class="dial-option lume-option" id="color-#fbbf24" data-lume-color="#fbbf24">
                        <div class="dial-circle lume-swatch-circle" data-swatch="#fbbf24"></div>
                        <span class="appearance-label">Gold</span>
                    </div>
                    <div class="dial-option lume-option" id="color-#fde047" data-lume-color="#fde047">
                        <div class="dial-circle lume-swatch-circle" data-swatch="#fde047"></div>
                        <span class="appearance-label">Lemon</span>
                    </div>
                    <div class="dial-option lume-option" id="color-#38bdf8" data-lume-color="#38bdf8">
                        <div class="dial-circle lume-swatch-circle" data-swatch="#38bdf8"></div>
                        <span class="appearance-label">Ice Blue</span>
                    </div>
                    <div class="dial-option lume-option" id="color-#818cf8" data-lume-color="#818cf8">
                        <div class="dial-circle lume-swatch-circle" data-swatch="#818cf8"></div>
                        <span class="appearance-label">Indigo</span>
                    </div>
                    <div class="dial-option lume-option" id="color-#f472b6" data-lume-color="#f472b6">
                        <div class="dial-circle lume-swatch-circle" data-swatch="#f472b6"></div>
                        <span class="appearance-label">Magenta</span>
                    </div>
                    <div class="dial-option lume-option" id="color-#34d399" data-lume-color="#34d399">
                        <div class="dial-circle lume-swatch-circle" data-swatch="#34d399"></div>
                        <span class="appearance-label">Emerald</span>
                    </div>
                    <div class="dial-option lume-option" id="color-#fb7185" data-lume-color="#fb7185">
                        <div class="dial-circle lume-swatch-circle" data-swatch="#fb7185"></div>
                        <span class="appearance-label">Coral</span>
                    </div>
                </div>
            </div>

        </div>

        <div class="settings-footer">
            <button class="btn btn-secondary" id="settings-cancel">Cancel</button>
            <button class="btn btn-primary" id="settings-ok">OK</button>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>

</html>
